{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="col-sm-10">
    <h2 class="text-white my-5" > Wellcome On Dashboard Page :</h2>
    <div class="jumbotron jumbotron-fluid">
        <div class="container">
            {% csrf_token %}
            {% for i in form %}
            <h1 class="display-4 front-weight-bold">{{i.Title}}</h1>
            <p class="lead" >{{i.Descriptions}}</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock content %}
